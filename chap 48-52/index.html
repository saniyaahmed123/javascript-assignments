<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>chap 48-52</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Styling for the hidden edit form as per assignment */
        #editFormContainer {
            display: none;
            background-color: #f8f9fa;
            padding: 20px;
            border: 2px solid #0d6efd;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>

<body class="p-4">

    <div class="form-div mb-5">
        <form>
            <div class="mb-2 d-flex gap-2">
                <input type="text" class="form-control" id="fname" placeholder="first name">
                <input type="text" class="form-control" id="lname" placeholder="last name">
            </div>
            <div class="mb-2">
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-2">
                <input type="text" class="form-control" id="cnic" placeholder="CNIC">
            </div>
            <div class="mb-2">
                <input type="number" class="form-control" id="phone" placeholder="Phone number">
            </div>
            <div class="mb-2">
                <input type="date" class="form-control" id="dob">
            </div>
            <div class="mb-2">
                <button type="button" class="btn btn-primary" onclick="submitForm()">Submit</button>
                <button type="button" class="btn btn-secondary" onclick="createProfile()">Preview</button>
            </div>
        </form>
    </div>

    <div id="card" class="card mb-4" style="display:none; width: 18rem;"></div>

    <div class="div mb-5">
        <h4 class="name" style="color: blueviolet;">Sunflower Info</h4>
        <p id="description">
            Sunflowers are among the most recognizable plants...
            <a href="javascript:void(0)" onclick="changeText()" style="color: blueviolet;">read more</a>
        </p>
    </div>

    <hr>






    <!-- Student Management -->
    <div class="form-div-1 mt-5">
        <form class="form-div-2 mb-3">
            <div class="mb-2 d-flex gap-2">
                <input type="text" class="form-control" id="studentNameInput" placeholder="full name">
                <input type="number" class="form-control" id="studentRollInput" placeholder="Roll number">
            </div>
            <button type="button" class="btn btn-success" onclick="addStudent()">Add Student</button>
        </form>

        <div id="editFormContainer">
            <h4>Edit Student Record</h4>
            <input type="hidden" id="editIndex">
            <div class="mb-2">
                <label>Full Name</label>
                <input type="text" class="form-control" id="editFullname">
            </div>
            <div class="mb-2">
                <label>Roll Number</label>
                <input type="number" class="form-control" id="editRoll">
            </div>
            <button type="button" class="btn btn-primary" onclick="updateStudent()">Update</button>
            <button type="button" class="btn btn-secondary" onclick="hideEditForm()">Cancel</button>
        </div>

        <div class="mt-4">
            <table class="table table-striped border" id="table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Roll Number</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="tableBody">

                </tbody>
            </table>
        </div>
    </div>


    <div>
        <h1> DOM </h1>
        <div id="form-content" class="content">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" />
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" />
            <label for="email">Email</label>
            <input type="text" id="email" />
        </div>
        <div id="main-content" class="content">
            <p class="render"> First Name : Alex</p>
            <p class="render" id="lastName">Last Name: Bank</p>
            <p class="render"> Email : alexbank@example.com</p>
            <p class="render"> Country : Pakistan </p>
            <p class="render"> contact : +92 300 1234567</p>
        </div>
    </div>
    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
